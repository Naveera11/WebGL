<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple WebGL Triangle</title>
<style>
  canvas { border: 1px solid black; display: block; margin: 20px auto; }
</style>
</head>
<body>

<canvas id="glcanvas" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("glcanvas");
const gl = canvas.getContext("webgl");

if (!gl) { alert("WebGL not supported"); }

// Vertex shader
const vsSource = `
attribute vec2 aPosition;
attribute vec3 aColor;
uniform float uAngle;
varying vec3 vColor;

void main() {
    float c = cos(uAngle);
    float s = sin(uAngle);
    vec2 rotated = vec2(
        aPosition.x * c - aPosition.y * s,
        aPosition.x * s + aPosition.y * c
    );
    gl_Position = vec4(rotated, 0.0, 1.0);
    vColor = aColor;
}
`;

// Fragment shader
const fsSource = `
precision mediump float;
varying vec3 vColor;
void main() {
    gl_FragColor = vec4(vColor, 1.0);
}
`;

// Compile shader
function compileShader(src, type) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, src);
    gl.compileShader(shader);
    return shader;
}

const vertexShader = compileShader(vsSource, gl.VERTEX_SHADER);
const fragmentShader = compileShader(fsSource, gl.FRAGMENT_SHADER);

// Create program
const program = gl.createProgram();
gl.attachShader(program, vertexShader);
gl.attachShader(program, fragmentShader);
gl.linkProgram(program);
gl.useProgram(program);

// Triangle vertices (x, y, r, g, b)
const vertices = new Float32Array([
   0.0,  0.5, 1,0,0,   // Top - red
  -0.5, -0.5, 0,1,0,   // Left - green
   0.5, -0.5, 0,0,1    // Right - blue
]);

// Buffer
const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

// Attributes
const aPosition = gl.getAttribLocation(program, "aPosition");
const aColor = gl.getAttribLocation(program, "aColor");

gl.vertexAttribPointer(aPosition, 2, gl.FLOAT, false, 20, 0);
gl.enableVertexAttribArray(aPosition);

gl.vertexAttribPointer(aColor, 3, gl.FLOAT, false, 20, 8);
gl.enableVertexAttribArray(aColor);

// Rotation uniform
const uAngle = gl.getUniformLocation(program, "uAngle");
let angle = 0;

// Draw function
function draw() {
    gl.clearColor(0,0,0,1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform1f(uAngle, angle);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
}

// Interaction: press any key to rotate
document.addEventListener("keydown", () => {
    angle += 0.2; 
    draw();
});

// Initial draw
draw();
</script>

</body>
</html>
